version: '3.8'

services:
  web:
    # Build z našeho Dockerfile v aktuální složce
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - '3000:3000'
    restart: always
    environment:
      # Všechny tyto proměnné si Docker compose automaticky načte z lokálního souboru .env
      # (který musí být ve stejné složce jako tento docker-compose.yml)
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - OFFICIAL_USER_ID=${OFFICIAL_USER_ID}
